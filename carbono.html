<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Wallet | Simulador de Créditos</title>
    <link rel="stylesheet" href="carbono.css">
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">← VOLTAR AO HUB</a>
        <div style="font-weight: bold; color: var(--secondary);">AGRINHO 2026</div>
    </nav>

    <div class="container">
        <header>
            <h1>Carbon Wallet</h1>
            <p>Simulador de Créditos de Carbono</p>
        </header>

        <div class="calc-grid">
            <div class="panel">
                <h3>Dados da Propriedade</h3>
                <div class="input-group">
                    <label>Hectares Preservados</label>
                    <input type="number" id="ha" placeholder="Ex: 100" oninput="calcular()">
                </div>
                <div class="input-group">
                    <label>Bioma</label>
                    <select id="bioma" onchange="calcular()">
                        <option value="15">Mata Atlântica</option>
                        <option value="12">Amazônia</option>
                        <option value="8">Cerrado</option>
                        <option value="5">Pampas</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Preço CO₂ (USD)</label>
                    <input type="number" id="preco" value="15" oninput="calcular()">
                </div>
            </div>

            <div class="panel result-panel">
                <small>ESTIMATIVA DE GANHO ANUAL</small>
                
                <div class="result-container">
                    <div class="result-value" id="total">R$ 0,00</div>
                </div>
                
                <div class="stat-line">
                    <span>CO₂ Retirado:</span>
                    <strong id="co2">0 t/ano</strong>
                </div>
                <div class="stat-line">
                    <span>Dólar:</span>
                    <strong>R$ 5,25</strong>
                </div>
                <div class="stat-line">
                    <span>Impacto Ambiental:</span>
                    <span id="impacto-status" style="color: #999;">NEUTRO</span>
                </div>
            </div>
        </div>
    </div>

    <script src="carbono.js"></script>
</body>
</html>
